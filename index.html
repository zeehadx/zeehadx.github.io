<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHAMEDI ZEEHAD — Creative Designer & Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"> 
<style>
  :root {
    --green: #00ff9f;
    --green-dim: rgba(0,255,159,0.15);
    --green-glow: rgba(0,255,159,0.4);
    --bg: #050507;
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --muted: rgba(232,232,240,0.45);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: linear-gradient(rgba(5, 5, 7, 0.75), rgba(5, 5, 7, 0.75)), 
                url('https://r.jina.ai/i/05e0031843be4444983963f9479e0a0e'); /* Star Cluster Background */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor {
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s ease;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid var(--green-glow);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transition: all 0.18s cubic-bezier(.25,.8,.25,1);
  }

  /* ── SMOKE CANVAS ── */
  #smoke-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 5%;
    background: rgba(5,5,7,0.6);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--glass-border);
  }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--green); text-shadow: 0 0 20px var(--green-glow); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); transition: color 0.3s; font-weight: 600; }
  .nav-links a:hover { color: var(--green); }

  #hero { min-height: 100vh; display: flex; align-items: center; padding: 7rem 5% 4rem; gap: 6%; position: relative; }

  .avatar-frame {
    width: 280px; height: 280px;
    border-radius: 50%;
    position: relative;
    padding: 6px;
  }
  .avatar-frame::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--green), transparent 40%, var(--green) 60%, transparent 80%, var(--green));
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    z-index: 2;
    background: #000;
    border: 2px solid var(--bg);
  }
  .avatar-img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .status-dot { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--muted); margin-top: 1rem; text-transform: uppercase; letter-spacing: 1px;}
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 8vw, 7rem); line-height: 0.95; color: var(--text); }
  .hero-name span { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }

  .hero-tagline { font-size: 1.1rem; color: var(--muted); margin: 1.5rem 0; line-height: 1.8; min-height: 3.5rem;}
  .typing-cursor { color: var(--green); animation: blink-cur 0.8s infinite; }
  @keyframes blink-cur { 0%,100%{opacity:1} 50%{opacity:0} }

  .btn {
    padding: 0.85rem 2.2rem;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--green);
    color: var(--green);
    transition: all 0.3s;
    background: var(--green-dim);
    display: inline-block;
  }
  .btn:hover { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green-glow); }

  section { padding: 6rem 5%; position: relative; z-index: 1; }
  .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s ease-out; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--green-glow), transparent); margin: 0 5%; }
</style>
</head>
<body>

<canvas id="smoke-canvas"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav>
  <div class="nav-logo">AZ</div>
  <ul class="nav-links">
    <li><a href="#hero">Home</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><a href="#projects">Projects</a></li>
  </ul>
</nav>

<section id="hero">
  <div class="hero-left">
    <div class="avatar-frame">
      <div class="avatar-inner">
        <img src="https://r.jina.ai/i/6168e928f6d649479b1875154388e6e5" alt="Ahamedi Zeehad" class="avatar-img">
      </div>
    </div>
    <div class="status-dot">
      <div class="dot"></div> Available for work
    </div>
  </div>

  <div class="hero-right">
    <h1 class="hero-name">AHAMEDI<br><span>ZEEHAD</span></h1>
    <p class="hero-tagline">
      <span id="type-text"></span><span class="typing-cursor">|</span>
    </p>
    <a href="#contact" class="btn">Get In Touch</a>
  </div>
</section>

<div class="divider"></div>

<section id="projects" class="reveal">
  <h2 style="font-family: 'Bebas Neue'; font-size: 3.5rem; margin-bottom: 2rem;">Projects</h2>
  <div style="padding: 4rem; border: 1px dashed var(--green-dim); border-radius: 12px; text-align: center; background: var(--glass);">
    <p style="font-family: 'JetBrains Mono'; color: var(--green);">[SYSTEM STATUS: BUILDING...]</p>
    <h3 style="margin: 1rem 0;">Something extraordinary is coming soon.</h3>
  </div>
</section>

<section id="contact" class="reveal">
  <h2 style="font-family: 'Bebas Neue'; font-size: 3.5rem; margin-bottom: 2rem;">Contact</h2>
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem;">
    <div style="background: var(--glass); padding: 2rem; border: 1px solid var(--glass-border);">
      <p style="color: var(--green); font-size: 0.7rem; font-family: 'JetBrains Mono';">EMAIL</p>
      <p>gmjihadkhan@gmail.com</p>
    </div>
    <div style="background: var(--glass); padding: 2rem; border: 1px solid var(--glass-border);">
      <p style="color: var(--green); font-size: 0.7rem; font-family: 'JetBrains Mono';">PHONE</p>
      <p>+880 1756 543934</p>
    </div>
  </div>
</section>

<footer style="text-align: center; padding: 4rem; opacity: 0.5; font-family: 'JetBrains Mono'; font-size: 0.7rem;">
  © 2026 AHAMEDI ZEEHAD - ALL RIGHTS RESERVED
</footer>

<script>
/* ── CURSOR ── */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx + 'px'; cur.style.top = my + 'px';
});
(function animRing() {
  rx += (mx - rx - 18) * 0.15; ry += (my - ry - 18) * 0.15;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
})();

/* ── SMOKE ── */
const canvas = document.getElementById('smoke-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
class P {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random()*W; this.y = H+80; this.vy = -(Math.random()*0.5+0.2);
    this.life = 0; this.maxLife = 300+Math.random()*200; this.r = 80+Math.random()*100;
  }
  update() { this.y += this.vy; this.life++; if(this.life > this.maxLife) this.reset(); }
  draw() {
    ctx.beginPath();
    const a = Math.sin((this.life/this.maxLife)*Math.PI)*0.03;
    ctx.fillStyle = `rgba(0, 255, 159, ${a})`;
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
  }
}
const ps = Array.from({length: 40}, () => new P());
function anim() { ctx.clearRect(0,0,W,H); ps.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); }
anim();

/* ── TYPING ── */
const text = "Creative Designer & Developer. Crafting digital experiences that leave a mark.";
let idx = 0;
function type() {
  if(idx < text.length) {
    document.getElementById('type-text').textContent += text.charAt(idx);
    idx++; setTimeout(type, 50);
  }
}
setTimeout(type, 1000);

/* ── REVEAL ── */
const obs = new IntersectionObserver((es) => {
  es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, {threshold: 0.1});
document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
</script>
</body>
</html>
